<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cognito — Performance Marketing & Affiliate Growth for Ecommerce</title>
  <meta name="description" content="Cognito helps ecommerce brands scale through performance marketing and affiliate growth. Data-driven acquisition for ambitious ecommerce stores." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #020617;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      color: #f8fafc;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    .gradient-text {
      background: linear-gradient(135deg, #60a5fa 0%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-bg {
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(37,99,235,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 85% 60%, rgba(99,102,241,0.1) 0%, transparent 55%),
        #020617;
    }
    .section-alt { background: #0f172a; }
    .section-dark { background: #020617; }
    .card-glass {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .metric-card {
      background: rgba(10, 16, 36, 0.9);
      border: 1px solid rgba(59,130,246,0.2);
      backdrop-filter: blur(12px);
    }
    .btn-glow:hover {
      box-shadow: 0 0 28px rgba(37,99,235,0.45), 0 4px 20px rgba(37,99,235,0.2);
    }
    .nav-scrolled {
      background: rgba(2, 6, 23, 0.95) !important;
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }
    .anim {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .anim.visible { opacity: 1; transform: translateY(0); }
    .anim-d1 { transition-delay: 0.1s; }
    .anim-d2 { transition-delay: 0.2s; }
    .anim-d3 { transition-delay: 0.3s; }
    .anim-d4 { transition-delay: 0.4s; }
    .anim-d5 { transition-delay: 0.5s; }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-9px); }
    }
    .float-1 { animation: float 4.2s ease-in-out infinite; }
    .float-2 { animation: float 4.2s ease-in-out 1.1s infinite; }
    .float-3 { animation: float 4.2s ease-in-out 2.2s infinite; }

    .form-field {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: #f8fafc;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }
    .form-field::placeholder { color: #475569; }
    .form-field:hover { border-color: rgba(255,255,255,0.18); }
    .form-field:focus { border-color: rgba(37,99,235,0.6); background: rgba(37,99,235,0.05); }
    .form-field.error { border-color: rgba(239,68,68,0.6); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    .faq-body {
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1);
      max-height: 0;
    }
    .faq-body.open { max-height: 300px; }

    .chevron { transition: transform 0.3s ease; }
    .chevron.open { transform: rotate(180deg); }

    .step-connector {
      position: absolute;
      top: 28px;
      left: 100%;
      width: calc(100% - 0px);
      height: 1px;
      background: linear-gradient(90deg, rgba(37,99,235,0.5), transparent);
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ─── Scroll animation ─── */
    function useAnimateOnScroll() {
      useEffect(() => {
        const timer = setTimeout(() => {
          const obs = new IntersectionObserver(
            (entries) => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
            { threshold: 0.08, rootMargin: '0px 0px -40px 0px' }
          );
          document.querySelectorAll('.anim').forEach(el => obs.observe(el));
          return () => obs.disconnect();
        }, 80);
        return () => clearTimeout(timer);
      }, []);
    }

    /* ─── Icons ─── */
    const ArrowRight = () => (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    );
    const Check = () => (
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    );
    const ChevronDown = ({ open }) => (
      <svg className={`chevron${open ? ' open' : ''}`} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    );
    const SpinnerIcon = () => (
      <svg className="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <circle cx="12" cy="12" r="10" strokeOpacity="0.25"/>
        <path d="M12 2a10 10 0 0 1 10 10" strokeLinecap="round"/>
      </svg>
    );

    /* ─── SVG Icon set (blue/white, on-brand) ─── */
    const Icon = ({ name, size = 20, color = '#60a5fa' }) => {
      const s = { width: size, height: size, display: 'block' };
      const paths = {
        // Services
        'trending-up':   <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
        'users':         <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
        'target':        <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
        'link':          <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
        'sliders':       <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>,
        'bar-chart':     <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>,
        // Why Cognito
        'zap':           <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
        'beaker':        <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 3h6v11l3.5 6a1 1 0 0 1-.87 1.5H6.37A1 1 0 0 1 5.5 20L9 14V3z"/><line x1="6" y1="9" x2="18" y2="9"/></svg>,
        'shopping-bag':  <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
        'layers':        <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
        'clipboard':     <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>,
        // Contact
        'lock':          <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
      };
      return paths[name] || null;
    };

    /* ─── Section label ─── */
    const Tag = ({ children }) => (
      <span style={{ display:'inline-block', padding:'5px 14px', fontSize:'11px', fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', color:'#60a5fa', background:'rgba(59,130,246,0.1)', border:'1px solid rgba(59,130,246,0.2)', borderRadius:'100px', marginBottom:'16px' }}>
        {children}
      </span>
    );

    /* ══════════════════════════════════════
       NAV
    ══════════════════════════════════════ */
    function Nav() {
      const [scrolled, setScrolled] = useState(false);
      const [open, setOpen] = useState(false);
      const [active, setActive] = useState('home');

      useEffect(() => {
        const onScroll = () => {
          setScrolled(window.scrollY > 40);
          const ids = ['contact','faq','process','results','why','services','about','home'];
          for (const id of ids) {
            const el = document.getElementById(id);
            if (el && window.scrollY >= el.offsetTop - 130) { setActive(id); break; }
          }
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const go = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 72, behavior: 'smooth' });
        setOpen(false);
      };

      const links = [
        { id:'about', label:'About' },
        { id:'services', label:'Services' },
        { id:'why', label:'Why Cognito' },
        { id:'results', label:'Results' },
        { id:'process', label:'Process' },
        { id:'faq', label:'FAQ' },
      ];

      return (
        <nav style={{ position:'fixed', top:0, left:0, right:0, zIndex:1000, transition:'all 0.3s' }} className={scrolled ? 'nav-scrolled' : ''}>
          <div style={{ maxWidth:'1200px', margin:'0 auto', padding:'0 24px' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', height:'72px' }}>
              {/* Logo */}
              <button onClick={() => go('home')} style={{ display:'flex', alignItems:'center', gap:'10px', background:'none', border:'none', cursor:'pointer' }}>
                <div style={{ width:'36px', height:'36px', borderRadius:'9px', background:'#2563eb', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 4px 16px rgba(37,99,235,0.4)', flexShrink:0 }}>
                  <span style={{ color:'#fff', fontWeight:900, fontSize:'17px', lineHeight:1 }}>C</span>
                </div>
                <span style={{ color:'#fff', fontWeight:800, fontSize:'20px', letterSpacing:'-0.02em' }}>Cognito</span>
              </button>

              {/* Desktop links */}
              <div style={{ display:'flex', gap:'2px' }} className="hidden-mobile">
                {links.map(l => (
                  <button key={l.id} onClick={() => go(l.id)}
                    style={{ padding:'8px 14px', borderRadius:'8px', fontSize:'13.5px', fontWeight:500, background:'none', border:'none', cursor:'pointer', transition:'all 0.2s',
                      color: active === l.id ? '#60a5fa' : '#94a3b8',
                      background: active === l.id ? 'rgba(59,130,246,0.1)' : 'transparent',
                    }}
                    onMouseEnter={e => { if (active !== l.id) { e.target.style.color='#f8fafc'; e.target.style.background='rgba(255,255,255,0.05)'; }}}
                    onMouseLeave={e => { if (active !== l.id) { e.target.style.color='#94a3b8'; e.target.style.background='transparent'; }}}
                  >{l.label}</button>
                ))}
              </div>

              {/* CTA */}
              <button onClick={() => go('contact')} className="hidden-mobile btn-glow"
                style={{ background:'#2563eb', color:'#fff', border:'none', padding:'10px 22px', borderRadius:'9px', fontSize:'13.5px', fontWeight:600, cursor:'pointer', transition:'all 0.2s' }}
                onMouseEnter={e => { e.currentTarget.style.background='#3b82f6'; e.currentTarget.style.transform='translateY(-1px)'; }}
                onMouseLeave={e => { e.currentTarget.style.background='#2563eb'; e.currentTarget.style.transform='translateY(0)'; }}
              >Get in Touch</button>

              {/* Hamburger */}
              <button onClick={() => setOpen(!open)} style={{ background:'none', border:'none', cursor:'pointer', display:'none', flexDirection:'column', gap:'5px', padding:'6px' }} className="show-mobile">
                <span style={{ display:'block', width:'22px', height:'2px', background:'#f8fafc', borderRadius:'2px', transition:'all 0.3s', transform: open ? 'rotate(45deg) translate(5px,5px)' : 'none' }}></span>
                <span style={{ display:'block', width:'22px', height:'2px', background:'#f8fafc', borderRadius:'2px', transition:'all 0.3s', opacity: open ? 0 : 1 }}></span>
                <span style={{ display:'block', width:'22px', height:'2px', background:'#f8fafc', borderRadius:'2px', transition:'all 0.3s', transform: open ? 'rotate(-45deg) translate(5px,-5px)' : 'none' }}></span>
              </button>
            </div>
          </div>

          {/* Mobile menu */}
          <div style={{ maxHeight: open ? '400px' : '0', overflow:'hidden', transition:'max-height 0.35s ease', background:'rgba(2,6,23,0.98)', borderTop: open ? '1px solid rgba(255,255,255,0.07)' : 'none' }}>
            <div style={{ padding:'12px 24px 20px', display:'flex', flexDirection:'column', gap:'4px' }}>
              {links.map(l => (
                <button key={l.id} onClick={() => go(l.id)}
                  style={{ background:'none', border:'none', textAlign:'left', padding:'11px 14px', borderRadius:'8px', fontSize:'14px', fontWeight:500, color:'#cbd5e1', cursor:'pointer', transition:'all 0.2s' }}
                  onMouseEnter={e => { e.currentTarget.style.background='rgba(255,255,255,0.06)'; e.currentTarget.style.color='#f8fafc'; }}
                  onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#cbd5e1'; }}
                >{l.label}</button>
              ))}
              <button onClick={() => go('contact')}
                style={{ marginTop:'8px', background:'#2563eb', color:'#fff', border:'none', padding:'12px', borderRadius:'9px', fontSize:'14px', fontWeight:600, cursor:'pointer' }}
              >Get in Touch</button>
            </div>
          </div>
        </nav>
      );
    }

    /* ══════════════════════════════════════
       HERO
    ══════════════════════════════════════ */
    function Hero() {
      const go = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 72, behavior: 'smooth' });
      };

      return (
        <section id="home" className="hero-bg" style={{ minHeight:'100vh', display:'flex', alignItems:'center', paddingTop:'72px' }}>
          <div style={{ maxWidth:'1200px', margin:'0 auto', padding:'80px 24px', width:'100%' }}>
            <div className="hero-grid">
              {/* Left */}
              <div>
                <div style={{ display:'inline-flex', alignItems:'center', gap:'8px', padding:'6px 16px', borderRadius:'100px', background:'rgba(59,130,246,0.1)', border:'1px solid rgba(59,130,246,0.2)', marginBottom:'32px' }}>
                  <span style={{ width:'7px', height:'7px', borderRadius:'50%', background:'#60a5fa', display:'inline-block', animation:'pulse 2s ease-in-out infinite' }}></span>
                  <span style={{ color:'#60a5fa', fontSize:'13px', fontWeight:500 }}>Performance Marketing & Affiliate Growth</span>
                </div>

                <h1 style={{ fontSize:'clamp(40px,5.5vw,68px)', fontWeight:900, lineHeight:1.04, letterSpacing:'-0.03em', color:'#f8fafc', marginBottom:'24px' }}>
                  Grow Your<br />Ecommerce Store<br /><span className="gradient-text">At Scale</span>
                </h1>

                <p style={{ fontSize:'18px', lineHeight:1.7, color:'#94a3b8', marginBottom:'40px', maxWidth:'480px' }}>
                  Cognito partners with ecommerce brands to drive measurable growth through performance marketing and affiliate acquisition — focused on quality traffic that converts.
                </p>

                <div style={{ display:'flex', gap:'14px', flexWrap:'wrap' }}>
                  <button onClick={() => go('contact')} className="btn-glow"
                    style={{ display:'inline-flex', alignItems:'center', gap:'8px', background:'#2563eb', color:'#fff', border:'none', padding:'15px 30px', borderRadius:'11px', fontSize:'15px', fontWeight:600, cursor:'pointer', transition:'all 0.2s' }}
                    onMouseEnter={e => { e.currentTarget.style.background='#3b82f6'; e.currentTarget.style.transform='translateY(-2px)'; }}
                    onMouseLeave={e => { e.currentTarget.style.background='#2563eb'; e.currentTarget.style.transform='translateY(0)'; }}
                  >Get in Touch <ArrowRight /></button>
                  <button onClick={() => go('process')}
                    style={{ display:'inline-flex', alignItems:'center', gap:'8px', background:'transparent', color:'#f8fafc', border:'1px solid rgba(255,255,255,0.15)', padding:'15px 30px', borderRadius:'11px', fontSize:'15px', fontWeight:600, cursor:'pointer', transition:'all 0.2s' }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor='rgba(255,255,255,0.3)'; e.currentTarget.style.background='rgba(255,255,255,0.04)'; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor='rgba(255,255,255,0.15)'; e.currentTarget.style.background='transparent'; }}
                  >See How We Work</button>
                </div>

                {/* Stats row */}
                <div style={{ display:'flex', gap:'40px', marginTop:'52px', paddingTop:'32px', borderTop:'1px solid rgba(255,255,255,0.07)' }}>
                  {[['4.8x','Avg. ROAS'],['200+','Campaigns Run'],['3x','Affiliate Growth']].map(([v,l],i) => (
                    <div key={i}>
                      <div style={{ fontSize:'26px', fontWeight:800, color:'#f8fafc', letterSpacing:'-0.02em' }}>{v}</div>
                      <div style={{ fontSize:'13px', color:'#475569', marginTop:'3px' }}>{l}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Right — dashboard cards */}
              <div className="hero-cards">
                {/* Revenue card */}
                <div className="float-1 metric-card" style={{ borderRadius:'18px', padding:'24px', marginBottom:'14px', boxShadow:'0 20px 60px rgba(0,0,0,0.5)' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'16px' }}>
                    <span style={{ fontSize:'11px', fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase', color:'#475569' }}>Monthly Revenue</span>
                    <span style={{ fontSize:'11px', fontWeight:700, color:'#34d399', background:'rgba(52,211,153,0.1)', padding:'3px 10px', borderRadius:'100px' }}>+247%</span>
                  </div>
                  <div style={{ fontSize:'30px', fontWeight:800, color:'#f8fafc', letterSpacing:'-0.02em', marginBottom:'4px' }}>$842,300</div>
                  <div style={{ fontSize:'12px', color:'#475569', marginBottom:'20px' }}>vs. $242,000 prior year</div>
                  <div style={{ display:'flex', alignItems:'flex-end', gap:'4px', height:'52px' }}>
                    {[30,45,38,60,52,72,65,80,75,92,85,100].map((h,i) => (
                      <div key={i} style={{ flex:1, borderRadius:'3px', background: i===11 ? '#2563eb' : 'rgba(255,255,255,0.08)', height:`${h}%` }}></div>
                    ))}
                  </div>
                </div>

                {/* ROAS + CAC row */}
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px' }}>
                  <div className="float-2 metric-card" style={{ borderRadius:'16px', padding:'20px', boxShadow:'0 12px 40px rgba(0,0,0,0.4)' }}>
                    <div style={{ fontSize:'11px', fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase', color:'#475569', marginBottom:'12px' }}>ROAS</div>
                    <div style={{ fontSize:'28px', fontWeight:800, color:'#f8fafc', letterSpacing:'-0.02em' }}>4.8x</div>
                    <div style={{ fontSize:'11px', fontWeight:600, color:'#34d399', marginTop:'4px' }}>↑ from 1.9x</div>
                    <div style={{ marginTop:'14px', height:'4px', background:'rgba(255,255,255,0.08)', borderRadius:'2px', overflow:'hidden' }}>
                      <div style={{ height:'100%', width:'80%', background:'linear-gradient(90deg,#2563eb,#60a5fa)', borderRadius:'2px' }}></div>

    function Contact() {
      const [form, setForm] = useState({ name:'', email:'', url:'' });
      const [errors, setErrors] = useState({});
      const [status, setStatus] = useState('idle');

      const validate = () => {
        const e = {};
        if (!form.name.trim()) e.name = 'Name is required';
        if (!form.email.trim()) e.email = 'Email is required';
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Enter a valid email';
        if (!form.url.trim()) e.url = 'Company URL is required';
        return e;
      };

      const submit = (ev) => {
        ev.preventDefault();
        const e = validate();
        if (Object.keys(e).length) { setErrors(e); return; }
        setErrors({});
        setStatus('submitting');
        setTimeout(() => setStatus('success'), 1400);
      };

      const change = (ev) => {
        setForm(p => ({ ...p, [ev.target.name]: ev.target.value }));
        if (errors[ev.target.name]) setErrors(p => ({ ...p, [ev.target.name]: undefined }));
      };

      return (
        <section id="contact" className="section-alt" style={{ padding:'96px 0' }}>

                  ) : (
                    <>
                      <h3 style={{ fontSize:'20px', fontWeight:700, color:'#f8fafc', marginBottom:'28px' }}>Start the Conversation</h3>
                      <form onSubmit={submit} noValidate>
                        {[
                          { name:'name', label:'Full Name', type:'text', placeholder:'Jane Smith' },
                          { name:'email', label:'Work Email', type:'email', placeholder:'jane@yourstore.com' },
                          { name:'url', label:'Company URL', type:'text', placeholder:'https://yourstore.com' },
                        ].map(field => (
                          <div key={field.name} style={{ marginBottom:'20px' }}>
                            <label style={{ display:'block', fontSize:'13px', fontWeight:600, color:'#cbd5e1', marginBottom:'8px' }}>{field.label}</label>
                            <input
                              type={field.type}
                              name={field.name}
                              value={form[field.name]}
                              onChange={change}
                              placeholder={field.placeholder}
                              className={`form-field${errors[field.name] ? ' error' : ''}`}
                            />
                            {errors[field.name] && <p style={{ fontSize:'12px', color:'#f87171', marginTop:'6px' }}>{errors[field.name]}</p>}
                          </div>
                        ))}
                        <button type="submit" disabled={status==='submitting'} className="btn-glow"
                          style={{ width:'100%', background: status==='submitting' ? '#1d4ed8' : '#2563eb', color:'#fff', border:'none', padding:'14px', borderRadius:'10px', fontSize:'15px', fontWeight:600, cursor: status==='submitting' ? 'not-allowed' : 'pointer', transition:'all 0.2s', display:'flex', alignItems:'center', justifyContent:'center', gap:'8px', marginTop:'8px' }}
                          onMouseEnter={e => { if(status!=='submitting'){ e.currentTarget.style.background='#3b82f6'; e.currentTarget.style.transform='translateY(-1px)'; }}}
                          onMouseLeave={e => { e.currentTarget.style.background = status==='submitting' ? '#1d4ed8' : '#2563eb'; e.currentTarget.style.transform='translateY(0)'; }}
                        >
                          {status === 'submitting' ? <><SpinnerIcon /> Sending...</> : 'Get in Touch'}
                        </button>
                      </form>
                      <p style={{ textAlign:'center', fontSize:'12px', color:'#334155', marginTop:'16px' }}>
                        By submitting, you agree to be contacted by the Cognito team. No spam, ever.
                      </p>
                    </>
                  )}
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    function Footer() {
      const go = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 72, behavior: 'smooth' });
      };
      return (
        <footer style={{ background:'#020617', borderTop:'1px solid rgba(255,255,255,0.07)' }}>
          {/* Main footer row */}
          <div style={{ maxWidth:'1200px', margin:'0 auto', padding:'48px 24px 40px' }}>
            <div className="footer-inner">
              {/* Logo + tagline */}
              <div>
                <button onClick={() => go('home')} style={{ display:'flex', alignItems:'center', gap:'10px', background:'none', border:'none', cursor:'pointer', marginBottom:'12px' }}>
                  <div style={{ width:'34px', height:'34px', borderRadius:'9px', background:'#2563eb', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 4px 12px rgba(37,99,235,0.35)' }}>
                    <span style={{ color:'#fff', fontWeight:900, fontSize:'16px' }}>C</span>
                  </div>
                  <span style={{ color:'#f8fafc', fontWeight:800, fontSize:'18px', letterSpacing:'-0.02em' }}>Cognito</span>
                </button>
                <p style={{ fontSize:'13px', color:'#475569', maxWidth:'220px', lineHeight:1.6 }}>Performance marketing &amp; affiliate growth for ecommerce brands.</p>
              </div>

              {/* Nav links */}
              <div style={{ display:'flex', gap:'4px', flexWrap:'wrap', justifyContent:'center' }}>
                {[['about','About'],['services','Services'],['why','Why Cognito'],['results','Results'],['process','Process'],['faq','FAQ'],['contact','Contact']].map(([id,label]) => (
                  <button key={id} onClick={() => go(id)}
                    style={{ background:'none', border:'none', padding:'7px 13px', fontSize:'13px', color:'#475569', cursor:'pointer', borderRadius:'7px', transition:'color 0.2s', fontFamily:'Inter,sans-serif' }}
                    onMouseEnter={e => e.currentTarget.style.color='#94a3b8'}
                    onMouseLeave={e => e.currentTarget.style.color='#475569'}
                  >{label}</button>
                ))}
              </div>

              {/* CTA */}
              <button onClick={() => go('contact')}
                style={{ background:'rgba(37,99,235,0.12)', border:'1px solid rgba(37,99,235,0.25)', color:'#60a5fa', padding:'10px 22px', borderRadius:'9px', fontSize:'13px', fontWeight:600, cursor:'pointer', transition:'all 0.2s', fontFamily:'Inter,sans-serif', whiteSpace:'nowrap' }}
                onMouseEnter={e => { e.currentTarget.style.background='rgba(37,99,235,0.2)'; e.currentTarget.style.borderColor='rgba(37,99,235,0.4)'; }}
                onMouseLeave={e => { e.currentTarget.style.background='rgba(37,99,235,0.12)'; e.currentTarget.style.borderColor='rgba(37,99,235,0.25)'; }}
              >Get in Touch →</button>
            </div>
          </div>

          {/* Bottom bar */}
          <div style={{ borderTop:'1px solid rgba(255,255,255,0.06)', padding:'18px 24px' }}>
            <div style={{ maxWidth:'1200px', margin:'0 auto', display:'flex', alignItems:'center', justifyContent:'center', gap:'16px', flexWrap:'wrap' }}>
              <p style={{ fontSize:'13px', color:'#475569', textAlign:'center' }}>
                © {new Date().getFullYear()} Cognito. All rights reserved.
              </p>
            </div>
          </div>
        </footer>
      );
    }

    /* ══════════════════════════════════════
       SCROLL TO TOP
    ══════════════════════════════════════ */
    function ScrollTop() {
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const onScroll = () => setVisible(window.scrollY > 500);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      return (
        <button onClick={() => window.scrollTo({ top:0, behavior:'smooth' })}
          style={{ position:'fixed', bottom:'28px', right:'28px', width:'44px', height:'44px', borderRadius:'11px', background:'#2563eb', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 4px 20px rgba(37,99,235,0.4)', transition:'all 0.3s', opacity: visible ? 1 : 0, transform: visible ? 'translateY(0)' : 'translateY(12px)', pointerEvents: visible ? 'auto' : 'none', zIndex:999 }}
          onMouseEnter={e => { e.currentTarget.style.background='#3b82f6'; e.currentTarget.style.transform='translateY(-2px)'; }}
          onMouseLeave={e => { e.currentTarget.style.background='#2563eb'; e.currentTarget.style.transform=visible?'translateY(0)':'translateY(12px)'; }}
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="18 15 12 9 6 15"/>
          </svg>
        </button>
      );
    }

    /* ══════════════════════════════════════
       APP
    ══════════════════════════════════════ */
    function App() {
      useAnimateOnScroll();
      return (
        <>
          <Nav />
          <Hero />
          <About />
          <Services />
          <WhyCognito />
          <CaseStudies />
          <HowWeWork />
          <FAQ />
          <Contact />
          <Footer />
          <ScrollTop />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Responsive layout styles -->
  <style>
    .hidden-mobile { display: flex; }
    .show-mobile { display: none !important; }
    .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
    .hero-cards { display: flex; flex-direction: column; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
    .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .cases-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .steps-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .footer-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }

    @media (max-width: 1024px) {
      .services-grid { grid-template-columns: repeat(2, 1fr); }
      .cases-grid { grid-template-columns: repeat(2, 1fr); }
      .steps-grid { grid-template-columns: repeat(3, 1fr); }
      .step-connector { display: none; }
    }
    @media (max-width: 768px) {
      .hidden-mobile { display: none !important; }
      .show-mobile { display: flex !important; }
      .hero-grid { grid-template-columns: 1fr; gap: 48px; }
      .hero-cards { display: none; }
      .two-col { grid-template-columns: 1fr; gap: 48px; }
      .services-grid { grid-template-columns: 1fr; }
      .cases-grid { grid-template-columns: 1fr; }
      .steps-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .footer-inner { flex-direction: column; text-align: center; }
    }
    @media (max-width: 480px) {
      .steps-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</body>
</html>
